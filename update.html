<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Màn hình cập nshật</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            color: #333;
            display: flex;
            justify-content: center;
        }

        .wrapper {
            width: 800px;
            border: 1px solid #ccc; /* Khung ngoài cùng giống như trong ảnh */
            padding: 20px;
            box-sizing: border-box;
        }

        /* Header & Footer */
        .nav-bar, .footer {
            border: 1px solid black;
            text-align: center;
            padding: 10px;
            font-size: 15px;
        }

        .nav-bar b {
            font-weight: bold;
        }

        /* Form Container */
        .main-content {
            border: 1px solid black;
            width: 550px;
            margin: 40px auto;
            padding: 40px;
            box-sizing: border-box;
        }

        .main-content h2 {
            text-align: center;
            font-weight: normal;
            font-size: 22px;
            margin-bottom: 35px;
        }

        /* Form Groups */
        .form-group {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .form-group label {
            width: 120px;
            font-size: 14px;
            text-align: left;
            padding-right: 10px;
        }

        .form-group input {
            flex: 1;
            padding: 8px;
            border: 1px solid black;
            text-align: center;
            font-size: 14px;
        }

        /* Actions */
        .actions {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-top: 30px;
            gap: 25px;
        }

        .actions a {
            color: #5b9bd5;
            text-decoration: none;
            font-size: 14px;
        }

        .btn-submit {
            background-color: #0052cc;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-submit:hover {
            background-color: #0043a8;
        }

        .footer {
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="nav-bar">
            Home | Đăng nhập | <b>Đăng ký</b>
        </div>

        <div class="main-content">
            <h2>Màn hình cập nhật</h2>

            <div class="form-group">
                <label>Username</label>
                <input type="text" value="xxx">
            </div>

            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" value="xxx">
            </div>

            <div class="form-group">
                <label>Nhập lại<br>mật khẩu</label>
                <input type="password" value="xxx">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" value="xxx">
            </div>

            <div class="actions">
                <a href="#">Đã có tài khoản</a>
                <button type="submit" class="btn-submit">Đăng ký</button>
            </div>
        </div>

        <div class="footer">
            Lập trình web @01/2024
        </div>
    </div>

</body>
</html>

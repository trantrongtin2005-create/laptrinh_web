<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Màn hình cập nhật</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Container tổng cho vừa kích thước */
        .wrapper {
            width: 800px;
            max-width: 100%;
        }

        /* Style cho Header và Footer */
        .header, .footer {
            border: 1px solid black;
            text-align: center;
            padding: 10px;
            margin-bottom: 20px;
            font-size: 15px;
        }

        .header b {
            font-weight: bold;
        }

        .footer {
            margin-top: 20px;
            margin-bottom: 0;
        }

        /* Style cho hộp form chính */
        .form-container {
            border: 1px solid black;
            width: 500px;
            margin: 40px auto;
            padding: 40px 50px;
            box-sizing: border-box;
        }

        .form-container h2 {
            text-align: center;
            font-weight: normal;
            font-size: 22px;
            margin-top: 0;
            margin-bottom: 30px;
            color: #444;
        }

        /* Style cho các dòng input */
        .form-group {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .form-group label {
            width: 100px;
            text-align: center;
            font-size: 14px;
            margin-right: 15px;
            line-height: 1.4;
        }

        .form-group input {
            flex: 1;
            padding: 8px;
            border: 1px solid black;
            text-align: center; /* Căn giữa text 'xxx' */
            font-size: 14px;
            outline: none;
        }

        /* Khu vực nút bấm */
        .form-actions {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-top: 30px;
            gap: 20px;
        }

        .form-actions a {
            color: #5b9bd5;
            text-decoration: none;
            font-size: 14px;
        }

        .form-actions a:hover {
            text-decoration: underline;
        }

        .form-actions button {
            background-color: #0052cc;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .form-actions button:hover {
            background-color: #0043a8;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="header">
            Home | Đăng nhập | <b>Đăng ký</b>
        </div>

        <div class="form-container">
            <h2>Màn hình cập nhật</h2>

            <div class="form-group">
                <label>Username</label>
                <input type="text" placeholder="xxx" value="xxx">
            </div>

            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" placeholder="xxx" value="xxx">
            </div>

            <div class="form-group">
                <label>Nhập lại<br>mật khẩu</label>
                <input type="password" placeholder="xxx" value="xxx">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="xxx" value="xxx">
            </div>

            <div class="form-actions">
                <a href="#">Đã có tài khoản</a>
                <button type="button">Đăng ký</button>
            </div>
        </div>

        <div class="footer">
            Lập trình web @01/2024
        </div>
    </div>

</body>
</html>

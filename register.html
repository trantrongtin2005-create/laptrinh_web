<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lập trình web - Đăng ký</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            background-color: #fff;
        }

        .browser-mockup {
            width: 800px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            padding-bottom: 20px;
        }

        /* Header Navigation */
        .nav-header {
            border: 1px solid black;
            margin: 20px;
            padding: 10px;
            text-align: center;
            font-size: 14px;
        }

        .nav-header b {
            font-weight: bold;
        }

        /* Register Box */
        .register-container {
            border: 1px solid black;
            width: 500px;
            margin: 40px auto;
            padding: 40px 50px;
            box-sizing: border-box;
        }

        .register-container h2 {
            text-align: center;
            font-weight: normal;
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 40px;
        }

        /* Form Layout */
        .form-group {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .form-group label {
            width: 100px;
            font-size: 14px;
            line-height: 1.2;
        }

        .form-group input {
            flex: 1;
            padding: 8px;
            border: 1px solid black;
            outline: none;
        }

        /* Footer & Actions */
        .form-footer {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-top: 35px;
            gap: 20px;
        }

        .form-footer a {
            color: #5b9bd5;
            text-decoration: none;
            font-size: 14px;
        }

        .btn-register {
            background-color: #0052cc;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .footer-bottom {
            border: 1px solid black;
            margin: 20px;
            padding: 10px;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="browser-mockup">
        <div class="nav-header">
            Home | Đăng nhập | <b>Đăng ký</b>
        </div>

        <div class="register-container">
            <h2>Màn hình đăng ký</h2>

            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username">
            </div>

            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" name="password">
            </div>

            <div class="form-group">
                <label>Nhập lại<br>mật khẩu</label>
                <input type="password" name="re-password">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email">
            </div>

            <div class="form-footer">
                <a href="#">Đã có tài khoản</a>
                <button type="submit" class="btn-register">Đăng ký</button>
            </div>
        </div>

        <div class="footer-bottom">
            Lập trình web @01/2024
        </div>
    </div>

</body>
</html>
